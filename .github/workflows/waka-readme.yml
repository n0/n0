name: Update Stats Badges

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Update stats badges
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          python - <<'EOF'
          import os, re, base64, requests

          GH_TOKEN = os.environ["GH_TOKEN"]
          WAKATIME_API_KEY = os.environ["WAKATIME_API_KEY"]

          # --- Fetch total commits via GitHub GraphQL ---
          def fetch_commits():
              url = "https://api.github.com/graphql"
              headers = {"Authorization": f"bearer {GH_TOKEN}"}

              years_query = """
              query {
                user(login: "n0") {
                  contributionsCollection {
                    contributionYears
                  }
                }
              }
              """
              r = requests.post(url, json={"query": years_query}, headers=headers)
              r.raise_for_status()
              years = r.json()["data"]["user"]["contributionsCollection"]["contributionYears"]

              total = 0
              for year in years:
                  year_query = f"""
                  query {{
                    user(login: "n0") {{
                      contributionsCollection(from: "{year}-01-01T00:00:00Z", to: "{year}-12-31T23:59:59Z") {{
                        totalCommitContributions
                        restrictedContributionsCount
                      }}
                    }}
                  }}
                  """
                  r = requests.post(url, json={"query": year_query}, headers=headers)
                  r.raise_for_status()
                  data = r.json()["data"]["user"]["contributionsCollection"]
                  total += data["totalCommitContributions"] + data["restrictedContributionsCount"]

              return total

          # --- Fetch lines of code via WakaTime ---
          def fetch_lines():
              api_key_b64 = base64.b64encode(WAKATIME_API_KEY.encode()).decode()
              headers = {"Authorization": f"Basic {api_key_b64}"}
              r = requests.get(
                  "https://wakatime.com/api/v1/users/current/stats/all_time",
                  headers=headers,
                  timeout=30,
              )
              if r.status_code != 200:
                  return 0
              data = r.json().get("data", {})
              return data.get("total_lines_written", 0)

          # --- Format numbers ---
          def fmt(n):
              if n >= 1_000_000:
                  val = n / 1_000_000
                  s = f"{val:.1f}".rstrip("0").rstrip(".")
                  return f"{s}M"
              if n >= 1_000:
                  return f"{n:,}"
              return str(n)

          commits = fetch_commits()
          lines = fetch_lines()
          print(f"Commits: {commits}, Lines: {lines}")

          commits_str = fmt(commits)
          lines_str = fmt(lines)

          with open("README.md", "r") as f:
              content = f.read()

          content = re.sub(
              r"(img\.shields\.io/badge/commits-)([^-]+)(-blue)",
              rf"\g<1>{commits_str}\3",
              content,
          )
          content = re.sub(
              r"(img\.shields\.io/badge/lines-)([^-]+)(-blue)",
              rf"\g<1>{lines_str}\3",
              content,
          )

          with open("README.md", "w") as f:
              f.write(content)

          print("README.md updated.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update stats badges"
          git push
